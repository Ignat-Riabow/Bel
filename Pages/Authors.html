            <div class="information_Ynka_Kypala">
                Якуб Колас (настоящее имя Константин Мицкевич) является одним из классиков и основоположников белорусской литературы. Он родился в деревне Акинчицы Столбцовского района, учился в Несвиже, работал на Пинщине и в других уголках Беларуси.
                <!-- <p>Первый сборник поэта («Песні жальбы») вышел в Вильне в 1910 году. Народную славу классику принесли поэмы «Сымон-музыка» и «Новая зямля», трилогия «На ростанях», повести «На прасторах жыцця».
                </p>
                
                <p>Якуб Колас хорошо знал психологию белорусских крестьян и много писал о том, что волновало народ. Во всех его произведениях встречается детальное описание белорусской природы. В 1926 году Якубу Коласу (второму после Янки Купалы) было присвоено звание народного поэта Беларуси.
                </p> -->
